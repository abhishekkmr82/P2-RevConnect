<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Messages — RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content">
            <div style="grid-column: 1 / 3;">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                    <button onclick="history.back()" class="btn btn-ghost btn-sm" style="padding: 0.5rem;"
                        title="Go Back">
                        <i data-lucide="arrow-left" style="width: 20px;"></i>
                    </button>
                    <h1 style="font-size: 1.5rem; margin: 0;">Messages</h1>
                </div>

                <div class="card card-flush shadow-sm"
                    style="border-radius: var(--radius-xl); overflow: hidden; border: 1px solid var(--border-glass); background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(16px);">
                    <div th:if="${contacts.empty}" class="text-center" style="padding: 4rem;">
                        <div
                            style="width: 80px; height: 80px; background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(139, 92, 246, 0.1)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                            <i data-lucide="message-square" class="icon-sky" style="width: 36px; height: 36px;"></i>
                        </div>
                        <h3 class="font-bold mb-2">No active conversations</h3>
                        <p class="text-secondary mb-6">Connect with others to start chatting.</p>
                        <a th:href="@{/profile/search(q='')}" class="btn btn-primary"
                            style="padding: 0.75rem 2rem;">Start a Conversation</a>
                    </div>

                    <div th:each="contact : ${contacts}" class="contact-item-hover"
                        style="border-bottom: 1px solid var(--border-light); transition: var(--transition-normal);">
                        <a th:href="@{'/messages/' + ${contact.id}}"
                            style="display: flex; align-items: center; gap: 1.25rem; padding: 1.25rem 1.5rem; text-decoration: none;">
                            <div class="avatar"
                                style="width: 50px; height: 50px; border-radius: 50%; overflow: hidden; box-shadow: var(--shadow-sm); border: 2px solid white;">
                                <img th:if="${contact.profilePicture != null && !contact.profilePicture.isEmpty()}"
                                    th:src="@{${contact.profilePicture}}"
                                    style="width: 100%; height: 100%; object-fit: cover;" />
                                <span th:if="${contact.profilePicture == null || contact.profilePicture.isEmpty()}"
                                    th:text="${contact.fullName != null ? contact.fullName.substring(0,1).toUpperCase() : contact.username.substring(0,1).toUpperCase()}"
                                    style="display:flex; align-items:center; justify-content:center; width:100%; height:100%; background: var(--primary-gradient); color: white; font-weight: bold; font-size: 1.2rem;"></span>
                            </div>
                            <div style="flex: 1;">
                                <div class="font-bold"
                                    style="font-size: 1.05rem; color: var(--text-main); margin-bottom: 2px;"
                                    th:text="${contact.fullName ?: contact.username}"></div>
                                <div class="text-sm" style="color: white;" th:text="'@' + ${contact.username}"></div>
                            </div>
                            <div class="btn btn-ghost btn-sm"
                                style="background: rgba(255, 255, 255, 0.5); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                                <i data-lucide="chevron-right" style="width: 20px; color: var(--text-secondary);"></i>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <aside class="sidebar-right">
                <div class="card">
                    <div class="widget-title">Privacy</div>
                    <p class="text-xs text-secondary">Messages are private between you and the recipient.</p>
                </div>
            </aside>
        </div>
    </section>
</body>

</html>
