<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title th:text="'Chat with ' + ${contact.username} + ' — RevConnect'">Chat</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 800px; margin: 0 auto; width: 100%;">
                <div class="flex items-center gap-4 mb-4"
                    style="background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(16px); padding: 1rem 1.5rem; border-radius: var(--radius-xl); border: 1px solid var(--border-glass); box-shadow: var(--shadow-sm);">
                    <a href="javascript:history.back()" class="btn btn-ghost btn-sm"
                        style="background: rgba(255, 255, 255, 0.5); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; padding: 0;"
                        title="Go Back">
                        <i data-lucide="arrow-left" style="width: 20px;"></i>
                    </a>
                    <div class="avatar"
                        style="width: 48px; height: 48px; border-radius: 50%; overflow: hidden; border: 2px solid white; box-shadow: var(--shadow-sm);">
                        <img th:if="${contact.profilePicture != null && !contact.profilePicture.isEmpty()}"
                            th:src="@{${contact.profilePicture}}"
                            style="width: 100%; height: 100%; object-fit: cover;" />
                        <span th:if="${contact.profilePicture == null || contact.profilePicture.isEmpty()}"
                            th:text="${contact.fullName != null ? contact.fullName.substring(0,1).toUpperCase() : contact.username.substring(0,1).toUpperCase()}"
                            style="display:flex; align-items:center; justify-content:center; width:100%; height:100%; background: var(--primary-gradient); color: white; font-weight: bold; font-size: 1.1rem;"></span>
                    </div>
                    <div>
                        <h2 style="font-size: 1.15rem; color: var(--text-main);" class="font-bold"
                            th:text="${contact.fullName ?: contact.username}"></h2>
                        <div class="flex items-center gap-1.5 text-sm" style="color: white;">
                            <span
                                style="width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success);"></span>
                            <span style="opacity: 0.9;">Active Now</span>
                        </div>
                    </div>
                </div>

                <div class="chat-container">
                    <div class="chat-messages" id="chatWindow" style="background: transparent; padding: 2rem;">
                        <div th:each="msg : ${messages}"
                            th:class="${msg.sender.id == currentUser.id} ? 'message-wrapper sent' : 'message-wrapper received'"
                            style="margin-bottom: 0.5rem; animation: slideIn 0.3s ease-out;">

                            <!-- Received Avatar -->
                            <div th:if="${msg.sender.id != currentUser.id}" class="avatar avatar-xs"
                                style="width: 36px; height: 36px; border-radius: 50%; overflow: hidden; border: 2px solid white; flex-shrink: 0; align-self: flex-end;">
                                <img th:if="${contact.profilePicture != null && !contact.profilePicture.isEmpty()}"
                                    th:src="@{${contact.profilePicture}}"
                                    style="width: 100%; height: 100%; object-fit: cover;" />
                                <span th:if="${contact.profilePicture == null || contact.profilePicture.isEmpty()}"
                                    th:text="${contact.fullName != null ? contact.fullName.substring(0,1).toUpperCase() : contact.username.substring(0,1).toUpperCase()}"
                                    style="display:flex; align-items:center; justify-content:center; width:100%; height:100%; background: var(--primary-gradient); color: white; font-weight: bold; font-size: 0.8rem;"></span>
                            </div>

                            <!-- Message Bubble -->
                            <div th:class="${msg.sender.id == currentUser.id} ? 'bubble sent' : 'bubble received'"
                                style="padding: 1rem 1.25rem; border-radius: 18px; max-width: 85%; box-shadow: var(--shadow-sm);">
                                <div th:text="${msg.content}" style="font-size: 1rem;"></div>
                                <span class="msg-time" th:text="${#temporals.format(msg.createdAt, 'HH:mm')}"
                                    style="font-size: 0.75rem; margin-top: 5px;"></span>
                            </div>
                        </div>
                    </div>

                    <div class="chat-input-area" style="border-top: 1px solid var(--border-glass); padding: 1.5rem;">
                        <form th:action="@{'/messages/' + ${contact.id} + '/send'}" method="post" class="flex gap-3">
                            <input type="text" name="content" class="form-control" placeholder="Type your message..."
                                required autocomplete="off" style="border-radius: 999px; padding: 0.75rem 1.5rem;" />
                            <button type="submit" class="btn btn-primary"
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; flex-shrink: 0;">
                                <i data-lucide="send" style="width: 20px; height: 20px; margin-left: -2px;"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const win = document.getElementById('chatWindow');
            if (win) win.scrollTop = win.scrollHeight;
        </script>
    </section>
</body>

</html>
