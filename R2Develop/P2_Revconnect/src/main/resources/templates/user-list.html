<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title th:text="${title ?: 'People — RevConnect'}">People</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 700px; margin: 0 auto; width: 100%;">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                    <a href="javascript:history.back()" class="btn btn-ghost btn-sm" style="padding: 0.5rem;">
                        <i data-lucide="arrow-left" style="width: 20px;"></i>
                    </a>
                    <h1 style="font-size: 1.75rem;" th:text="${title ?: 'People'}">People</h1>
                </div>

                <div th:if="${users.empty}" class="card" style="text-align: center; padding: 4rem;">
                    <i data-lucide="users"
                        style="width: 48px; height: 48px; margin: 0 auto 1rem; color: var(--text-muted);"></i>
                    <p class="text-secondary">No people listed here yet.</p>
                </div>

                <div th:each="user : ${users}" class="card mb-4" style="padding: 1.5rem;">
                    <div style="display: flex; align-items: center; gap: 1.5rem;">
                        <div class="avatar avatar-lg" style="overflow: hidden;">
                            <img th:if="${user.profilePicture != null and !user.profilePicture.isEmpty()}"
                                th:src="@{${user.profilePicture}}" style="width: 100%; height: 100%; object-fit: cover;"
                                alt="Avatar" />
                            <span th:if="${user.profilePicture == null or user.profilePicture.isEmpty()}"
                                th:text="${user.username.substring(0,1).toUpperCase()}"
                                style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--primary-gradient); color: white;"></span>
                        </div>
                        <div style="flex: 1;">
                            <a th:href="@{'/profile/' + ${user.username}}"
                                style="font-weight: 700; font-size: 1.25rem; display: block; color: var(--text-main);"
                                th:text="${user.fullName ?: user.username}"></a>
                            <div style="color: var(--text-secondary); font-size: 0.9rem;"
                                th:text="'@' + ${user.username}"></div>
                            <div style="font-size: 0.95rem; margin-top: 0.75rem; color: var(--text-secondary);"
                                th:if="${user.bio}"
                                th:text="${user.bio.length() > 100 ? user.bio.substring(0,100) + '...' : user.bio}">
                            </div>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.75rem; align-items: flex-end;">
                            <span th:if="${user.role.name() != 'PERSONAL'}" class="badge" th:text="${user.role}"></span>
                            <a th:href="@{'/profile/' + ${user.username}}" class="btn btn-outline btn-sm">View
                                Profile</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
