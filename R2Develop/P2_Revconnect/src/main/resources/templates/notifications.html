<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Notifications — RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content">
            <div style="grid-column: 1 / 3; max-width: 800px; margin: 0 auto; width: 100%;">
                <div class="flex items-center justify-between mb-6">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <button onclick="history.back()" class="btn btn-ghost btn-sm" style="padding: 0.5rem;"
                            title="Go Back">
                            <i data-lucide="arrow-left" style="width: 20px;"></i>
                        </button>
                        <h1 style="font-size: 1.5rem; margin: 0;">Notifications</h1>
                    </div>
                    <div class="flex gap-2">
                        <form th:if="${!notifications.empty}" th:action="@{/notifications/clear}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger);">
                                <i data-lucide="trash-2" style="width: 16px;"></i>
                                <span>Clear All</span>
                            </button>
                        </form>
                        <a th:href="@{/notifications/preferences}" class="btn btn-ghost btn-sm">
                            <i data-lucide="settings" style="width: 16px;"></i>
                            <span>Preferences</span>
                        </a>
                    </div>
                </div>

                <div th:if="${notifications.empty}" class="card text-center" style="padding: 4rem;">
                    <i data-lucide="bell-off"
                        style="width: 48px; height: 48px; margin: 0 auto 1rem; color: var(--text-muted);"></i>
                    <p class="text-secondary">You're all caught up!</p>
                </div>

                <div th:each="n : ${notifications}" class="card mb-2 flex items-center gap-4"
                    th:styleappend="${!n.read ? 'border-left: 3px solid var(--primary); background: var(--bg-soft);' : ''}">

                    <div
                        style="width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--bg-surface); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; color: var(--primary);">
                        <span th:switch="${n.type.name()}">
                            <i th:case="'CONNECTION_REQUEST'" data-lucide="user-plus" style="width: 20px;"></i>
                            <i th:case="'CONNECTION_ACCEPTED'" data-lucide="check-circle-2" style="width: 20px;"></i>
                            <i th:case="'NEW_FOLLOWER'" data-lucide="user" style="width: 20px;"></i>
                            <i th:case="'POST_LIKED'" data-lucide="heart" style="width: 20px;"></i>
                            <i th:case="'POST_COMMENTED'" data-lucide="message-circle" style="width: 20px;"></i>
                            <i th:case="'POST_SHARED'" data-lucide="repeat" style="width: 20px;"></i>
                            <i th:case="*" data-lucide="bell" style="width: 20px;"></i>
                        </span>
                    </div>

                    <div style="flex: 1;">
                        <div class="text-sm font-bold" th:text="${n.message}">Notification message</div>
                        <div class="text-xs text-muted mt-1"
                            th:text="${#temporals.format(n.createdAt,'dd MMM, HH:mm')}">Time</div>
                    </div>

                    <div class="flex gap-2">
                        <div th:if="${n.referenceId != null}">
                            <a th:href="@{'/posts/' + ${n.referenceId}}" class="btn btn-ghost btn-sm"
                                title="View Reference">
                                <i data-lucide="external-link" style="width: 16px;"></i>
                            </a>
                        </div>
                        <form th:if="${!n.read}" th:action="@{'/notifications/read/' + ${n.id}}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-ghost btn-sm" title="Mark as Read">
                                <i data-lucide="check" style="width: 16px;"></i>
                            </button>
                        </form>
                        <form th:action="@{'/notifications/delete/' + ${n.id}}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger);"
                                title="Delete">
                                <i data-lucide="trash" style="width: 16px;"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <aside class="sidebar-right">
                <div class="card">
                    <div class="widget-title">Tips</div>
                    <p class="text-xs text-secondary">Keep an eye on notifications to stay connected with your network.
                    </p>
                </div>
            </aside>
        </div>
    </section>
</body>

</html>
