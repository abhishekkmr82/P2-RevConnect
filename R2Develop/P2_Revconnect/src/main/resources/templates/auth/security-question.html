<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Question — RevConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body class="auth-page">
    <div class="auth-card">
        <div class="text-center">
            <div class="auth-logo"
                style="background: linear-gradient(135deg, #f97316, #f59e0b); padding: 8px; border-radius: 12px; display: inline-flex;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-message-square-code-icon lucide-message-square-code">
                    <path
                        d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z" />
                    <path d="m10 8-3 3 3 3" />
                    <path d="m14 14 3-3-3-3" />
                </svg>
            </div>
            <div style="font-weight: 800; font-size: 1.5rem; margin-top: 0.5rem; letter-spacing: -0.03em;">Verify
                Identity</div>
            <p class="auth-tagline">Answer your security question to reset your password.</p>
        </div>

        <!-- Error Alert -->
        <div class="alert alert-error" th:if="${errorMessage}" style="margin-bottom: 1.5rem; text-align: left;">
            <i data-lucide="alert-circle" style="width: 18px;"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Display security question -->
        <div
            style="background: rgba(255,255,255,0.06); border-radius: 0.75rem; padding: 1rem 1.25rem; margin-bottom: 1.5rem; border: 1px solid var(--border-color);">
            <p style="margin: 0 0 0.35rem 0; font-weight: 600; font-size: 0.7rem; letter-spacing: 0.05em; color: #999;">
                YOUR SECURITY QUESTION</p>
            <p style="margin: 0; font-weight: 600; font-size: 1.05rem; color: #f0a050;" th:text="${securityQuestion}">
                Security question
                here</p>
        </div>

        <form th:action="@{/reset-password}" method="post">

            <!-- Hidden fields to pass context -->
            <input type="hidden" name="usernameOrEmail" th:value="${usernameOrEmail}" />

            <div class="form-group">
                <label class="form-label" for="securityAnswer">Your Answer <span
                        style="color:var(--danger);">*</span></label>
                <input type="text" id="securityAnswer" name="securityAnswer" class="form-control"
                    placeholder="Enter your answer" required autofocus />
            </div>

            <div class="form-group">
                <label class="form-label" for="newPassword">New Password <span
                        style="color:var(--danger);">*</span></label>
                <input type="password" id="newPassword" name="newPassword" class="form-control"
                    placeholder="Minimum 6 characters" required minlength="6" />
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password <span
                        style="color:var(--danger);">*</span></label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                    placeholder="Re-enter your new password" required minlength="6" />
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-4">
                <i data-lucide="rotate-ccw" style="width: 18px; margin-right: 0.5rem;"></i>
                Reset Password
            </button>
        </form>

        <div style="margin: 2rem 0; display: flex; align-items: center; gap: 1rem;">
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
            <span class="text-xs text-muted" style="font-weight: 600;">OR</span>
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
        </div>

        <p class="text-center text-sm text-secondary">
            <a th:href="@{/forgot-password}" class="font-bold icon-lavender" style="font-weight: 600;">Try a different
                account</a>
            &nbsp;·&nbsp;
            <a th:href="@{/login}" class="font-bold icon-sky" style="font-weight: 600;">Back to Login</a>
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
