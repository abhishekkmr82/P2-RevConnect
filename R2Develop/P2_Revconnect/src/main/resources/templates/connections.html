<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Connections — RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content">
            <div style="grid-column: 1 / 3;">
                <div class="flex items-center justify-between mb-6">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <button onclick="history.back()" class="btn btn-ghost btn-sm" style="padding: 0.5rem;"
                            title="Go Back">
                            <i data-lucide="arrow-left" style="width: 20px;"></i>
                        </button>
                        <h1 style="font-size: 1.5rem; margin: 0;">My Connections</h1>
                    </div>
                    <div class="flex gap-2">
                        <span class="badge" th:text="${connections.size()} + ' total'"></span>
                    </div>
                </div>

                <!-- All Connections -->
                <h2 class="widget-title mb-4">All Connections</h2>

                <div th:if="${connections.empty}" class="card text-center" style="padding: 4rem;">
                    <i data-lucide="users"
                        style="width: 48px; height: 48px; margin: 0 auto 1rem; color: var(--text-muted);"></i>
                    <p class="text-secondary mb-4">You haven't connected with anyone yet.</p>
                    <a th:href="@{/profile/search(q='')}" class="btn btn-primary btn-sm">Discover People</a>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;">
                    <div th:each="user : ${connections}" class="card flex items-center gap-4">
                        <div class="avatar">
                            <img th:if="${user.profilePicture != null && !user.profilePicture.isEmpty()}"
                                th:src="@{${user.profilePicture}}"
                                style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" />
                            <span th:if="${user.profilePicture == null || user.profilePicture.isEmpty()}"
                                th:text="${user.username.substring(0,1).toUpperCase()}"></span>
                        </div>
                        <div style="flex: 1;">
                            <a th:href="@{'/profile/' + ${user.username}}" class="font-bold hover:text-primary"
                                th:text="${user.fullName ?: user.username}"></a>
                            <div class="text-xs text-secondary" th:text="'@' + ${user.username}"></div>
                        </div>
                        <div class="flex gap-2">
                            <a th:href="@{'/profile/' + ${user.username}}" class="btn btn-ghost btn-sm">
                                <i data-lucide="chevron-right" style="width: 18px;"></i>
                            </a>
                            <!-- Remove connection -->
                            <form th:action="@{'/connections/remove/' + ${user.id}}" method="post"
                                onsubmit="return confirm('Remove this connection?');">
                                <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger);">
                                    <i data-lucide="user-x" style="width: 18px;"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar-right">
                <div class="card mb-4">
                    <div class="widget-title">Search</div>
                    <form th:action="@{/profile/search}" method="get">
                        <input type="text" name="q" class="form-control" placeholder="Search people..." />
                    </form>
                </div>


            </aside>
        </div>
    </section>
</body>

</html>
