<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Edit Profile — RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 600px; margin: 0 auto; width: 100%;">
                <div class="flex items-center gap-4 mb-6">
                    <button onclick="history.back()" class="btn btn-ghost btn-sm" style="padding: 0.5rem;"
                        title="Go Back">
                        <i data-lucide="arrow-left" style="width: 20px;"></i>
                    </button>
                    <h1 style="font-size: 1.5rem;">Edit Profile</h1>
                </div>

                <div th:if="${successMessage}" class="alert alert-success mb-6">
                    <i data-lucide="check-circle" style="width: 20px;"></i>
                    <span th:text="${successMessage}"></span>
                </div>

                <!-- General Info Form -->
                <div class="card mb-6">
                    <h3 class="widget-title">General Information</h3>
                    <form th:action="@{/profile/edit}" method="post" th:object="${profileDTO}">
                        <!-- CSRF Token -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="grid gap-4" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" th:field="*{fullName}" class="form-control" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Privacy</label>
                                <select th:field="*{privacySetting}" class="form-control">
                                    <option th:each="p : ${privacyOptions}" th:value="${p}" th:text="${p}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Bio</label>
                            <textarea th:field="*{bio}" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="grid gap-4" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">Location</label>
                                <input type="text" th:field="*{location}" class="form-control" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Website</label>
                                <input type="url" th:field="*{website}" class="form-control" />
                            </div>
                        </div>

                        <div th:if="${currentUser.role.name() != 'PERSONAL'}" class="mt-6 pt-6"
                            style="border-top: 1px solid var(--border-color);">
                            <h3 class="widget-title">
                                <span
                                    th:text="${currentUser.role.name() == 'BUSINESS' ? 'Business Settings' : 'Creator Settings'}"></span>
                            </h3>
                            <div class="grid gap-4" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label class="form-label">Category / Industry</label>
                                    <input type="text" th:field="*{category}" class="form-control"
                                        placeholder="e.g. Technology, Fashion" />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Contact Info</label>
                                    <input type="text" th:field="*{contactInfo}" class="form-control"
                                        placeholder="Phone or email" />
                                </div>
                            </div>
                            <div th:if="${currentUser.role.name() == 'BUSINESS'}" class="grid gap-4"
                                style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                                <div class="form-group">
                                    <label class="form-label">Business Address</label>
                                    <input type="text" th:field="*{businessAddress}" class="form-control"
                                        placeholder="123 Main St, City" />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Business Hours</label>
                                    <input type="text" th:field="*{businessHours}" class="form-control"
                                        placeholder="Mon-Fri 9AM-5PM" />
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full mt-4">Save Changes</button>
                    </form>
                </div>

                <!-- Profile Picture Upload Form -->
                <div class="card">
                    <h3 class="widget-title">Profile Picture</h3>
                    <form th:action="@{/profile/picture( ${_csrf.parameterName}=${_csrf.token} )}" method="post"
                        enctype="multipart/form-data">
                        <!-- CSRF Token -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="flex items-center gap-4">
                            <div class="avatar avatar-lg" style="overflow: hidden;">
                                <img th:if="${currentUser.profilePicture != null && !currentUser.profilePicture.isEmpty()}"
                                    th:src="@{${currentUser.profilePicture}}"
                                    style="width: 100%; height: 100%; object-fit: cover;" alt="" />
                                <span
                                    th:if="${currentUser.profilePicture == null || currentUser.profilePicture.isEmpty()}"
                                    th:text="${currentUser.username.substring(0,1).toUpperCase()}"
                                    style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--primary-gradient); color: white;"></span>
                            </div>
                            <div style="flex: 1;">
                                <input type="file" name="file" accept="image/*" class="form-control mb-2" />
                                <p class="text-xs text-muted">Square image works best. Max 5MB.</p>
                            </div>
                            <button type="submit" class="btn btn-outline btn-sm">Upload</button>
                        </div>
                    </form>
                </div>

                <!-- External Links Management -->
                <div class="card mt-6">
                    <h3 class="widget-title">External Links</h3>

                    <!-- Existing Links -->
                    <div th:if="${userLinks != null and !userLinks.empty}"
                        class="mb-4 flex flex-direction-column gap-2">
                        <div th:each="link : ${userLinks}" class="flex items-center justify-between p-3"
                            style="border: 1px solid var(--border-color); border-radius: 6px;">
                            <div>
                                <div class="font-bold flex items-center gap-2">
                                    <span th:text="${link.label}"></span>
                                    <span class="badge text-xs" th:text="${link.linkType}"></span>
                                </div>
                                <a th:href="${link.url}" target="_blank" class="text-sm text-primary"
                                    th:text="${link.url}"></a>
                            </div>
                            <form th:action="@{'/profile/links/' + ${link.id} + '/delete'}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit"
                                    class="btn btn-outline btn-sm text-danger border-danger">Remove</button>
                            </form>
                        </div>
                    </div>

                    <!-- Add New Link Form -->
                    <form th:action="@{/profile/links}" method="post" class="mt-4 pt-4"
                        style="border-top: 1px solid var(--border-light);">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="grid gap-4"
                            style="display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: end;">
                            <div class="form-group">
                                <label class="form-label">Label</label>
                                <input type="text" name="label" class="form-control" placeholder="e.g. My Portfolio"
                                    required />
                            </div>
                            <div class="form-group">
                                <label class="form-label">URL</label>
                                <input type="url" name="url" class="form-control" placeholder="https://..." required />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Type</label>
                                <select name="linkType" class="form-control">
                                    <option th:each="type : ${linkTypes}" th:value="${type}" th:text="${type}"></option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm mt-3">Add Link</button>
                    </form>
                </div>

                <!-- Products & Services Management -->
                <div th:if="${currentUser.role.name() != 'PERSONAL'}" class="card mt-6">
                    <h3 class="widget-title">Products & Services</h3>

                    <!-- Existing Products -->
                    <div th:if="${products != null and !products.empty}" class="mb-4 grid gap-4"
                        style="display: grid; grid-template-columns: 1fr 1fr;">
                        <div th:each="product : ${products}" class="p-4"
                            style="border: 1px solid var(--border-color); border-radius: 8px;">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="font-bold text-primary" th:text="${product.name}"></h4>
                                <form th:action="@{'/profile/products/' + ${product.id} + '/delete'}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="text-danger" title="Remove Product"
                                        style="background: none; border: none; cursor: pointer;">
                                        <i data-lucide="trash-2" style="width: 16px;"></i>
                                    </button>
                                </form>
                            </div>
                            <p class="text-sm text-secondary mb-3" th:text="${product.description}"></p>
                            <div class="flex items-center gap-3">
                                <span th:if="${product.price != null}" class="font-bold text-sm"
                                    th:text="'$' + ${product.price}"></span>
                                <a th:if="${product.externalUrl != null and !product.externalUrl.isEmpty()}"
                                    th:href="${product.externalUrl}" target="_blank"
                                    class="text-primary text-xs flex items-center gap-1"><i data-lucide="external-link"
                                        style="width: 12px;"></i> View Link</a>
                            </div>
                        </div>
                    </div>

                    <!-- Add New Product Form -->
                    <form th:action="@{/profile/products}" method="post" class="mt-4 pt-4"
                        style="border-top: 1px solid var(--border-light);">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="grid gap-4 mb-3" style="display: grid; grid-template-columns: 2fr 1fr;">
                            <div class="form-group">
                                <label class="form-label">Product Name</label>
                                <input type="text" name="name" class="form-control" required />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Price ($) (Optional)</label>
                                <input type="number" step="0.01" name="price" class="form-control" />
                            </div>
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="2" maxlength="500"></textarea>
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label">External Purchase URL (Optional)</label>
                            <input type="url" name="externalUrl" class="form-control" placeholder="https://..." />
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Add Product</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
