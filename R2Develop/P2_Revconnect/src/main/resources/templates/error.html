<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error — RevConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap"
            rel="stylesheet" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body
        style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-base);">
<div class="card shadow-lg" style="text-align: center; max-width: 480px; padding: 4rem;">
    <div class="mb-6 flex justify-center">
        <div style="padding: 1.5rem; border-radius: 50%; background: var(--bg-soft);">
            <i data-lucide="alert-triangle" class="icon-peach" style="width: 64px; height: 64px;"></i>
        </div>
    </div>

    <h1 class="mb-2" style="font-size: 4rem; font-weight: 300; color: var(--primary-alt);"
        th:text="${status ?: 'Error'}">500</h1>

    <h2 class="mb-6" style="font-size: 1.5rem; font-weight: 400; color: var(--text-main);"
        th:text="${error ?: 'Something went wrong'}">Internal Server Error</h2>

    <p class="text-secondary mb-10 leading-relaxed font-light"
       th:text="${message ?: 'The portal encountered an unexpected ripple. Please try again or return home.'}">
        An unexpected error occurred.
    </p>

    <div class="flex gap-4 justify-center">
        <a href="javascript:history.back()" class="btn btn-outline">Go Back</a>
        <a th:href="@{/feed}" class="btn btn-primary">Return Home</a>
    </div>
</div>
<script>
    lucide.createIcons();
</script>
</body>

</html>
