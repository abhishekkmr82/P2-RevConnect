<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Edit Post — RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 700px; margin: 0 auto; width: 100%;">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                    <a th:href="@{'/posts/' + ${postId}}" class="btn btn-ghost btn-sm" style="padding: 0.5rem;">
                        <i data-lucide="arrow-left" style="width: 20px;"></i>
                    </a>
                    <h1 style="font-size: 1.75rem;">Edit Post</h1>
                </div>

                <div class="card" style="padding: 2.5rem;">
                    <form th:action="@{'/posts/' + ${postId} + '/edit'}" method="post" th:object="${postDTO}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="form-group mb-6">
                            <label class="form-label" for="content">Post Content</label>
                            <textarea id="content" th:field="*{content}" class="form-control" rows="6" maxlength="500"
                                required placeholder="Update your post..."
                                style="font-size: 1.1rem; line-height: 1.5;"></textarea>
                        </div>

                        <div class="form-group mb-6">
                            <label class="form-label" for="hashtags">Hashtags</label>
                            <input type="text" id="hashtags" th:field="*{hashtags}" class="form-control"
                                placeholder="e.g. #tech, #life" />
                        </div>

                        <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                            <h3 style="margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--text-secondary);">Post
                                Action (CTA)
                            </h3>

                            <div class="grid gap-4" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                                <div class="form-group">
                                    <label class="form-label" for="ctaLabel">Button Label</label>
                                    <input type="text" id="ctaLabel" th:field="*{ctaLabel}" class="form-control"
                                        placeholder="e.g. Learn More" />
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="ctaUrl">Button URL</label>
                                    <input type="url" id="ctaUrl" th:field="*{ctaUrl}" class="form-control"
                                        placeholder="https://..." />
                                </div>
                            </div>
                        </div>

                        <div style="margin-top: 1.5rem; display: flex; align-items: center; gap: 1rem;">
                            <input type="checkbox" id="pinned" th:field="*{pinned}"
                                style="width: 20px; height: 20px; cursor: pointer;" />
                            <label for="pinned" style="font-weight: 600; cursor: pointer;">📌 Pin to Profile</label>
                        </div>

                        <div style="margin-top: 2.5rem; display: flex; gap: 1rem;">
                            <button type="submit" class="btn btn-primary"
                                style="flex: 2; padding: 1rem; font-weight: 700;">Save
                                Changes</button>
                            <a th:href="@{'/posts/' + ${postId}}" class="btn btn-ghost"
                                style="flex: 1; text-align: center; border: 1px solid var(--border-color);">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
