<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:fragment="layout(layout_content)">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle != null ? pageTitle + ' — RevConnect' : 'RevConnect'}">RevConnect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <script src="https://unpkg.com/lucide@latest"></script>
  <link th:href="@{/css/styles.css}" rel="stylesheet" />
  <th:block th:fragment="head-extra"></th:block>
</head>

<body class="theme-premium">
  <div class="bg-decor-top-right"></div>
  <div class="bg-decor-bottom-left"></div>
  <!-- Sophisticated Glass Navbar -->
  <nav class="navbar">
    <div class="container" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
      <a th:href="@{/}" class="logo"
        style="display: flex; align-items: center; gap: 0.75rem; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em;">
        <div
          style="background: linear-gradient(135deg, #f97316, #f59e0b); padding: 6px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-message-square-code-icon lucide-message-square-code">
            <path
              d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z" />
            <path d="m10 8-3 3 3 3" />
            <path d="m14 14 3-3-3-3" />
          </svg>
        </div>
        <span class="text-gradient">RevConnect</span>
      </a>

      <!-- Authenticated Menu -->
      <div class="nav-menu" th:if="${currentUser != null}" style="display: flex; gap: 1.25rem; align-items: center;">
        <a th:href="@{/feed}" class="nav-link" style="font-weight: 500; font-size: 0.9rem;">Feed</a>
        <a th:href="@{/messages}" class="nav-link" style="font-weight: 500; font-size: 0.9rem;">Chat</a>
        <a th:href="@{/connections}" class="nav-link" style="font-weight: 500; font-size: 0.9rem;">Network</a>
        <a th:href="@{/notifications}" class="nav-link" style="position: relative; display: flex; align-items: center;">
          <i data-lucide="bell" style="width: 20px;"></i>
          <span class="badge" th:if="${unreadCount != null && unreadCount > 0}" th:text="${unreadCount}"
            style="position: absolute; top: -4px; right: -4px; background: var(--danger); color: white; border: 2px solid var(--bg-surface);"></span>
        </a>

        <div
          style="display: flex; align-items: center; gap: 1.25rem; margin-left: 1rem; padding-left: 1.25rem; border-left: 1px solid var(--border-color);">
          <a th:href="@{/profile}" class="avatar"
            style="width: 36px; height: 36px; border: 2px solid transparent; transition: all 0.2s ease;">
            <img th:if="${currentUser.profilePicture != null && !currentUser.profilePicture.isEmpty()}"
              th:src="@{${currentUser.profilePicture}}" style="width: 100%; height: 100%; object-fit: cover;" alt="" />
            <span th:if="${currentUser.profilePicture == null || currentUser.profilePicture.isEmpty()}"
              th:text="${currentUser.username.substring(0,1).toUpperCase()}"
              style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--primary-gradient); color: white;"></span>
          </a>

          <form th:action="@{/logout}" method="post" style="margin: 0; display: flex;">
            <button type="submit" class="btn-ghost"
              style="padding: 0.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.2s ease;">
              <i data-lucide="log-out" style="width: 20px;"></i>
            </button>
          </form>
        </div>
      </div>

      <!-- Guest Menu -->
      <div class="nav-menu" th:if="${currentUser == null}" style="display: flex; gap: 1rem; align-items: center;">
        <a th:href="@{/login}" class="btn btn-ghost" style="font-weight: 600;">Login</a>
        <a th:href="@{/register}" class="btn btn-primary" style="box-shadow: 0 4px 12px var(--primary-glow);">Join
          RevConnect</a>
      </div>
    </div>
  </nav>

  <!-- FLASH MESSAGES -->
  <div class="container" style="margin-top: 2rem; position: relative; z-index: 100;">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
  </div>

  <!-- CONTENT INJECTION -->
  <main class="page-entry-animate">
    <div th:replace="${layout_content}"></div>
  </main>

  <style>
    .page-entry-animate {
      animation: pageIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes pageIn {
      0% {
        opacity: 0;
        transform: translateY(15px) scale(0.99);
        filter: blur(4px);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .nav-link {
      color: var(--text-secondary);
      transition: all 0.2s ease;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-md);
    }

    .nav-link:hover {
      color: var(--primary);
      background: rgba(79, 70, 229, 0.05);
    }

    .avatar:hover {
      border-color: var(--primary);
      transform: scale(1.05);
    }
  </style>

  <!-- COMMON MODAL FOR USER LISTS (LIKES/SHARES) -->
  <div id="genericModal" class="modal-overlay"
    style="display: none; position: fixed; inset: 0; background: rgba(8, 10, 15, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 10000; align-items: center; justify-content: center;">
    <div class="modal-content"
      style="background: var(--bg-surface); width: 100%; max-width: 440px; margin: 1.5rem; border-radius: 28px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); position: relative;">
      <div id="modalLoader" style="padding: 5rem 2rem; text-align: center;">
        <div class="spinner-premium"
          style="width: 42px; height: 42px; border: 3px solid rgba(139, 92, 246, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; margin: 0 auto 1.5rem; box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);">
        </div>
        <p class="text-sm font-bold tracking-wider"
          style="color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem;">Syncing participants...</p>
      </div>
      <div id="modalContentTarget"></div>
    </div>
  </div>

  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .modal-content {
      transform: translateY(30px) scale(0.96);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      filter: blur(4px);
    }

    .modal-overlay.active {
      display: flex !important;
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0) scale(1) !important;
      opacity: 1 !important;
      filter: blur(0) !important;
    }
  </style>

  <script>
    lucide.createIcons();

    function openModal(url) {
      if (!url) {
        console.error("No URL provided to openModal");
        return;
      }

      console.log("Opening modal for:", url);
      const modal = document.getElementById('genericModal');
      const target = document.getElementById('modalContentTarget');
      const loader = document.getElementById('modalLoader');

      if (!modal || !target || !loader) {
        console.error("Modal elements not found in DOM");
        return;
      }

      target.innerHTML = '';
      loader.style.display = 'block';
      modal.style.display = 'flex';

      // Ensure no leftover state
      modal.classList.remove('active');

      // Small delay to ensure display: flex is painted before opacity/transform starts
      setTimeout(() => {
        modal.classList.add('active');
      }, 10);

      fetch(url, { redirect: 'error' }) // Error out if redirected to login page
        .then(response => {
          if (!response.ok) {
            if (response.status === 404) throw new Error('Not Found (404)');
            if (response.status === 500) throw new Error('Server Error (500)');
            throw new Error('HTTP Status ' + response.status);
          }
          return response.text();
        })
        .then(html => {
          loader.style.display = 'none';
          target.innerHTML = html;
          if (window.lucide) window.lucide.createIcons();
        })
        .catch(err => {
          console.error("Modal Error:", err);
          loader.innerHTML = `
                  <div style="padding: 3rem 1rem; text-align: center;">
                      <i data-lucide="alert-circle" style="width: 40px; height: 40px; color: var(--danger); margin-bottom: 1rem;"></i>
                      <p style="font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem;">Unable to load list</p>
                      <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">${err.message || 'Connection error'}</p>
                      <button onclick="closeModal()" class="btn btn-outline btn-sm">Close</button>
                  </div>`;
          if (window.lucide) window.lucide.createIcons();
        });
    }

    function closeModal() {
      const modal = document.getElementById('genericModal');
      if (modal) {
        modal.classList.remove('active');
        setTimeout(() => {
          if (!modal.classList.contains('active')) {
            modal.style.display = 'none';
          }
        }, 300);
      }
    }

    document.getElementById('genericModal').addEventListener('click', (e) => {
      if (e.target.id === 'genericModal') closeModal();
    });
  </script>
  <script th:src="@{/js/main.js}"></script>
</body>

</html>
