<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Post Details — RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 800px; margin: 0 auto; width: 100%;">
                <button onclick="history.back()" class="btn btn-ghost btn-sm mb-4" style="padding: 0.5rem;"
                    title="Go Back">
                    <i data-lucide="arrow-left" style="width: 18px;"></i>
                    <span>Back</span>
                </button>

                <!-- Main Post -->
                <div class="card mb-6 post">
                    <div th:if="${post.postType.name() == 'REPOST'}"
                        class="text-xs text-primary mb-3 flex items-center gap-1">
                        <i data-lucide="repeat" style="width: 14px;"></i>
                        <span>Reposted from <a th:href="@{'/profile/' + ${post.originalPost?.author?.username}}"
                                th:text="'@' + ${post.originalPost?.author?.username}" class="font-bold"></a></span>
                    </div>

                    <div class="post-header">
                        <div class="avatar" style="overflow: hidden;">
                            <img th:if="${post.author.profilePicture != null && !post.author.profilePicture.isEmpty()}"
                                th:src="@{${post.author.profilePicture}}"
                                style="width: 100%; height: 100%; object-fit: cover;" alt="" />
                            <span th:if="${post.author.profilePicture == null || post.author.profilePicture.isEmpty()}"
                                th:text="${post.author.username.substring(0,1).toUpperCase()}"
                                style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--primary-gradient); color: white;"></span>
                        </div>
                        <div class="post-author">
                            <a th:href="@{'/profile/' + ${post.author.username}}"
                                class="author-name hover:text-primary">
                                <span th:text="${post.author.fullName ?: post.author.username}"></span>
                                <span th:if="${post.author.role.name() != 'PERSONAL'}" class="badge ml-2"
                                    th:text="${post.author.role}"></span>
                            </a>
                            <span class="post-time"
                                th:text="${#temporals.format(post.createdAt,'dd MMM yyyy, HH:mm')}"></span>
                            <span th:if="${post.pinned}"
                                style="color: var(--primary); font-size: 0.7rem; font-weight: 600;"
                                class="flex items-center gap-1">
                                <i data-lucide="pin" style="width: 13px;"></i> Pinned
                            </span>
                            <span th:if="${post.postType.name() == 'PROMOTIONAL'}"
                                style="background: rgba(56,189,248,0.12); color: var(--info); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600;">Promotional</span>
                            <span th:if="${post.postType.name() == 'ANNOUNCEMENT'}"
                                style="background: rgba(251,146,60,0.12); color: #f59e0b; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600;">Announcement</span>
                        </div>
                        <div th:if="${post.author.id == currentUser.id}" style="margin-left: auto;" class="flex gap-2">
                            <a th:href="@{'/posts/' + ${post.id} + '/edit'}" class="btn btn-ghost btn-sm">
                                <i data-lucide="edit-2" style="width: 16px;"></i>
                            </a>
                            <form th:action="@{'/posts/' + ${post.id} + '/delete'}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger);">
                                    <i data-lucide="trash-2" style="width: 16px;"></i>
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="post-content mt-4" style="font-size: 1.25rem;" th:text="${post.content}"></div>

                    <!-- Post Image Display -->
                    <div th:if="${post.imageUrl != null}" class="post-image mt-4"
                        style="border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color);">
                        <img th:src="@{${post.imageUrl}}" style="width: 100%; max-height: 600px; object-fit: cover;"
                            alt="Post content" />
                    </div>

                    <!-- Hashtags — clickable -->
                    <div class="flex gap-2 mt-4" th:if="${post.hashtags != null and !#strings.isEmpty(post.hashtags)}">
                        <a th:each="tag : ${#strings.arraySplit(post.hashtags,',')}"
                            th:href="@{/posts/search(hashtag=${#strings.trim(tag).replace('#','')})}"
                            class="text-sm font-bold" style="color: var(--primary); text-decoration: none;"
                            th:text="${#strings.trim(tag).startsWith('#') ? #strings.trim(tag) : '#' + #strings.trim(tag)}"></a>
                    </div>

                    <!-- Tagged Products -->
                    <div th:if="${not #lists.isEmpty(post.taggedProducts)}" class="mt-3 flex gap-2 flex-wrap"
                        style="padding-top: 0.5rem; border-top: 1px dashed var(--border-light);">
                        <a th:each="tp : ${post.taggedProducts}"
                            th:href="${tp.product.externalUrl != null && !tp.product.externalUrl.isEmpty() ? tp.product.externalUrl : '#'}"
                            target="_blank" class="text-xs font-bold"
                            style="display: inline-flex; align-items: center; gap: 4px; padding: 0.25rem 0.6rem; background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 20px; text-decoration: none; color: var(--text-main);">
                            <i data-lucide="shopping-bag" style="width: 12px; color: var(--primary);"></i>
                            <span th:text="${tp.product.name}"></span>
                        </a>
                    </div>

                    <div th:if="${post.ctaLabel != null && !post.ctaLabel.isEmpty() && post.ctaUrl != null && !post.ctaUrl.isEmpty()}"
                        class="mt-4">
                        <a th:href="${post.ctaUrl}" th:text="${post.ctaLabel}"
                            style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.5rem; background: var(--primary-gradient); color: white; border-radius: 8px; font-size: 0.9rem; font-weight: 600; text-decoration: none; box-shadow: var(--shadow-sm);"
                            target="_blank" rel="noopener"></a>
                    </div>

                    <div class="post-actions mt-6">
                        <form th:action="@{'/posts/' + ${post.id} + '/like'}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="action-item" th:classappend="${isLiked ? 'text-primary' : ''}">
                                <i data-lucide="heart" th:style="${isLiked ? 'fill: var(--primary)' : ''}"></i>
                                <span th:text="${likeCount}">0</span>
                            </button>
                        </form>
                        <div class="action-item">
                            <i data-lucide="message-circle"></i>
                            <span th:text="${comments.size()}">0</span>
                        </div>
                        <button type="button" class="action-item" th:if="${post.postType.name() != 'REPOST'}"
                            style="margin-left: auto;" th:onclick="'openShareModal(' + ${post.id} + ')'">
                            <i data-lucide="share-2" class="icon-mint"></i>
                            <span th:text="${post.shares.size()}">0</span>
                        </button>
                    </div>
                </div>

                <!-- Comments Section -->
                <div class="card">
                    <h3 class="mb-4">Comments</h3>

                    <form th:action="@{'/posts/' + ${post.id} + '/comment'}" method="post" class="mb-8">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="flex gap-3">
                            <textarea name="content" class="form-control" rows="2" placeholder="Add a comment..."
                                required></textarea>
                            <button type="submit" class="btn btn-primary" style="align-self: flex-end;">
                                <i data-lucide="send" style="width: 18px;"></i>
                            </button>
                        </div>
                    </form>

                    <div th:if="${comments.empty}" class="text-center py-8 text-muted">
                        No comments yet.
                    </div>

                    <div th:each="comment : ${comments}" class="flex gap-3 mb-6 pb-6"
                        style="border-bottom: 1px solid var(--border-color);">
                        <div class="avatar" style="width: 32px; height: 32px; font-size: 0.75rem; overflow: hidden;">
                            <img th:if="${comment.author.profilePicture != null && !comment.author.profilePicture.isEmpty()}"
                                th:src="@{${comment.author.profilePicture}}"
                                style="width: 100%; height: 100%; object-fit: cover;" alt="" />
                            <span
                                th:if="${comment.author.profilePicture == null || comment.author.profilePicture.isEmpty()}"
                                th:text="${comment.author.username.substring(0,1).toUpperCase()}"></span>
                        </div>
                        <div style="flex: 1;">
                            <div class="flex items-center justify-between">
                                <a th:href="@{'/profile/' + ${comment.author.username}}" class="text-sm font-bold"
                                    th:text="${comment.author.fullName ?: comment.author.username}"></a>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs text-muted"
                                        th:text="${#temporals.format(comment.createdAt,'dd MMM, HH:mm')}"></span>
                                    <form
                                        th:if="${comment.author.id == currentUser.id or post.author.id == currentUser.id}"
                                        th:action="@{'/posts/comments/' + ${comment.id} + '/delete'}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                            th:value="${_csrf.token}" />
                                        <input type="hidden" name="postId" th:value="${post.id}" />
                                        <button type="submit" class="text-danger"
                                            style="background:none; border:none; cursor:pointer;">
                                            <i data-lucide="trash-2" style="width: 14px;"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                            <div class="text-sm text-secondary mt-1" th:text="${comment.content}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SHARE MODAL -->
        <div id="shareModal" class="modal-overlay"
            style="display: none; position: fixed; inset: 0; background: rgba(8, 10, 15, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 10000; align-items: center; justify-content: center;">
            <div class="modal-content"
                style="background: var(--bg-surface); width: 100%; max-width: 440px; margin: 1.5rem; border-radius: 28px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); padding: 1.5rem;">
                <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem;">Share via Message</h3>

                <form th:action="@{/messages/share}" method="post" id="shareForm">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="postId" id="sharePostId" value="" />

                    <div th:if="${connections != null and not #lists.isEmpty(connections)}">
                        <label for="recipientId" class="form-label">Select Connection</label>
                        <select name="recipientId" id="recipientId" class="form-control" required
                            style="margin-bottom: 1.5rem;">
                            <option value="">-- Select a connection --</option>
                            <option th:each="conn : ${connections}" th:value="${conn.id}"
                                th:text="${conn.fullName ?: conn.username}"></option>
                        </select>

                        <div class="flex gap-2 justify-end">
                            <button type="button" class="btn btn-outline" onclick="closeShareModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Send Message</button>
                        </div>
                    </div>

                    <div th:if="${connections == null or #lists.isEmpty(connections)}">
                        <p class="text-muted mb-4">You don't have any connections to share this post with yet.</p>
                        <div class="flex gap-2 justify-end">
                            <button type="button" class="btn btn-outline" onclick="closeShareModal()">Close</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function openShareModal(postId) {
                document.getElementById('sharePostId').value = postId;
                document.getElementById('shareModal').style.display = 'flex';
                void document.getElementById('shareModal').offsetWidth;
                document.getElementById('shareModal').classList.add('active');
            }

            function closeShareModal() {
                const modal = document.getElementById('shareModal');
                modal.classList.remove('active');
                setTimeout(() => {
                    modal.style.display = 'none';
                }, 300);
            }

            document.getElementById('shareModal').addEventListener('click', function (e) {
                if (e.target.id === 'shareModal') {
                    closeShareModal();
                }
            });
        </script>
    </section>
</body>

</html>
